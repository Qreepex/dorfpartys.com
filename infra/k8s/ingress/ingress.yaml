# Nur das Frontend ist öffentlich erreichbar - das Backend wird ausschließlich
# intern über K8s-Service-DNS angesprochen (AGENTS.md Abschnitt 0), daher kein
# eigener Ingress-Pfad für den Backend-Service.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dorfpartys
  namespace: dorfpartys
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - www.dorfpartys.com
      secretName: dorfpartys-tls
  rules:
    - host: www.dorfpartys.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
