apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: dorfpartys
data:
  PORT: "3000"
  NODE_ENV: "production"
  # K8s-Service-DNS, nicht die öffentliche Domain (AGENTS.md Abschnitt 0).
  BACKEND_INTERNAL_URL: "http://backend.dorfpartys.svc.cluster.local:5000"
  PUBLIC_SITE_URL: "https://www.dorfpartys.com"
  AUTHENTIK_ISSUER: "https://auth.dorfpartys.com/application/o/dorf-partys-com/"
  AUTHENTIK_REDIRECT_URI: "https://www.dorfpartys.com/auth/callback"
  # SvelteKit Node-Adapter: vertraut dem von ingress-nginx gesetzten
  # x-forwarded-for-Header, damit event.getClientAddress() (frontend/src/hooks.server.ts)
  # die echte Browser-IP liefert statt der internen Ingress-Pod-IP. XFF_DEPTH=1,
  # weil ingress-nginx der einzige Proxy-Hop vor dem Frontend ist - ohne diese
  # beiden Variablen ignoriert der Adapter den Header standardmäßig.
  ADDRESS_HEADER: "x-forwarded-for"
  XFF_DEPTH: "1"
