apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: dorfpartys
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Vereinfachung für diese Phase: migrate.js läuft als initContainer bei
      # jedem Replica-Start (idempotent über drizzle's Migrations-Tabelle,
      # aber bei parallelem Rollout theoretisch racy). Für Staging/Prod besser
      # als separater Job vor dem Rollout auslösen.
      initContainers:
        - name: migrate
          image: registry.dorfpartys.com/dorfpartys/backend:latest
          command: ['node', 'dist/db/migrate.js']
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
      containers:
        - name: backend
          image: registry.dorfpartys.com/dorfpartys/backend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
