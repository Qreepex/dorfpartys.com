# Setzt den CloudNativePG-Operator im Cluster voraus (siehe README.md in
# diesem Ordner). Nicht production-ready (z.B. kein PITR-Backup konfiguriert) —
# reicht für lokal/staging (AGENTS.md Abschnitt 9/10: Postgres-Betrieb ist
# ein offener Punkt).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: dorfpartys
spec:
  instances: 1
  storage:
    size: 5Gi
  bootstrap:
    initdb:
      database: dorfpartys
      owner: dorfpartys
      secret:
        name: postgres-app-credentials
---
# Vorlage — kopieren nach credentials.yaml (gitignored) und echtes Passwort
# eintragen, oder äquivalent per `kubectl create secret generic ...`.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-app-credentials
  namespace: dorfpartys
type: kubernetes.io/basic-auth
stringData:
  username: dorfpartys
  password: CHANGE_ME
