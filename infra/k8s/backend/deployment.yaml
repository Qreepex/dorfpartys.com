apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: dorfpartys
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      # Vereinfachung für diese Phase: migrate.js läuft als initContainer bei
      # jedem Replica-Start (idempotent über drizzle's Migrations-Tabelle,
      # aber bei parallelem Rollout theoretisch racy). Für Staging/Prod besser
      # als separater Job vor dem Rollout auslösen.
      initContainers:
        - name: migrate
          image: ghcr.io/qreepex/dorfpartys/backend:1.2.0
          command: ["node", "backend/dist/db/migrate.js"]
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
        - name: seed
          image: ghcr.io/qreepex/dorfpartys/backend:1.2.0
          command: ["node", "backend/dist/db/seed/index.js"]
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
      containers:
        - name: backend
          image: ghcr.io/qreepex/dorfpartys/backend:1.2.0
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
