# Vorlage - kopieren nach secret.yaml (gitignored) und echte Werte eintragen,
# oder äquivalent per `kubectl create secret generic backend-secret ...`.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: dorfpartys
type: Opaque
stringData:
  DATABASE_URL: 'postgresql://dorfpartys:CHANGE_ME@postgres-rw:5432/dorfpartys'
  SESSION_COOKIE_SECRET: ''
  S3_ACCESS_KEY: ''
  S3_SECRET_KEY: ''
